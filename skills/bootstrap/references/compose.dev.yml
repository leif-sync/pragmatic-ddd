services:
  app:
    build: # In production, change target to "production" or use dockerHub image
      context: .
      dockerfile: dockerfile
      target: development

    ports:
      - target: 3000
        published: 3000

    # In production, use the built image without bind mounts.
    volumes:
      - type: bind
        source: .
        target: /workspace

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Note: Ensure a .env file exists before running docker compose
    # (for example, by copying .env.example to .env).
    env_file: [.env]
    depends_on:
      db:
        condition: service_healthy
    networks: [backend]
    restart: "unless-stopped"
    command: "sleep infinity" # Delete this line in production to run the app normally

  db:
    image: postgres:18.1-alpine

    ports:
      - target: 5432
        published: 5432

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}

    volumes:
      - type: volume
        source: "db-data"
        target: /var/lib/postgresql

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks: [backend]
    restart: "unless-stopped"

volumes:
  "db-data":

networks:
  backend:
    driver: bridge